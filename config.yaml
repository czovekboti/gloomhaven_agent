llm:
  model: "openai/gpt-oss-20b"
  temperature: 0.7
  local_model: "Qwen/Qwen3-1.7B"


embedding:
  model: "paraphrase-multilingual-MiniLM-L12-v2"

rag:
  n_results: 6
  chunk_size: 500
  chunk_overlap: 50
  collection_name: "gloomhaven_docs"
  
agent:
  max_generation_attempts: 3
  chat_history_messages: 1
  debug: False
  json_generation_attempts: 3
  

web_search:
  max_results: 3

formatting:
  chunk_max_chars: 1500
  web_result_max_chars: 1500
